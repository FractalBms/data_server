websocket:
  host: 0.0.0.0
  port: 8760

# Start order: broker → storage → NATS → bridge → writers → subscribers
order:
  - mosquitto
  - minio
  - nats
  - nats_bridge
  - generator
  - parquet_writer
  - aws_server
  - subscriber_api

components:

  mosquitto:
    label: "MQTT Broker (Mosquitto)"
    cmd: ["mosquitto", "-p", "1883", "-v"]
    cwd: "."

  minio:
    label: "S3 Store (MinIO)"
    cmd: ["./minio", "server", "./minio-data", "--console-address", ":9001"]
    cwd: "aws/data_store"
    env:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  nats:
    label: "NATS JetStream"
    cmd: ["nats-server", "-c", "nats-server.conf"]
    cwd: "manager"

  nats_bridge:
    label: "MQTT → NATS Bridge"
    cmd: ["python", "bridge.py", "--config", "config.yaml"]
    cwd: "source/nats_bridge"

  generator:
    label: "Data Generator"
    cmd: ["python", "generator.py", "--config", "config.yaml"]
    cwd: "source/generator"

  parquet_writer:
    label: "Parquet Writer (NATS → S3)"
    cmd: ["python", "writer.py", "--config", "config.yaml"]
    cwd: "source/parquet_writer"

  aws_server:
    label: "AWS Data Store Server"
    cmd: ["python", "server.py", "--config", "config.yaml"]
    cwd: "aws/data_store"

  subscriber_api:
    label: "Subscriber API (NATS + DuckDB)"
    cmd: ["python", "server.py", "--config", "config.yaml"]
    cwd: "subscriber/api"
