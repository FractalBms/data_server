websocket:
  host: 0.0.0.0
  port: 8763

auto_start: true

# orig_aws stack on spark-22b6: Mosquitto + InfluxDB2 + Telegraf (systemd log tails) + generator
order:
  - mosquitto
  - influxdb
  - telegraf
  - generator

components:

  mosquitto:
    label: "Mosquitto MQTT Broker (port 1883)"
    cmd: ["journalctl", "-fu", "mosquitto", "--no-pager", "--output=short"]
    cwd: "."

  influxdb:
    label: "InfluxDB2 (port 8086)"
    cmd: ["journalctl", "-fu", "influxdb", "--no-pager", "--output=short"]
    cwd: "."

  telegraf:
    label: "Telegraf — MQTT → InfluxDB2"
    cmd: ["journalctl", "-fu", "telegraf", "--no-pager", "--output=short"]
    cwd: "."

  generator:
    label: "Battery Data Generator (1152 cells)"
    cmd:
      - "orig_aws/.venv/bin/python"
      - "orig_aws/source/generator.py"
      - "--config"
      - "orig_aws/source/config.yaml"
    cwd: "."
