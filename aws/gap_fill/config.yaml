# Gap writer (current_state mode) — runs on aws-sim, subscribes to FlashMQ aws-sim :1884.
#
# Writes a single current_state.parquet into /srv/data/parquet-aws-sim/ (the root
# of the aws-sim store).  DuckDB globs **/*.parquet and finds it automatically
# alongside the date-partitioned files delivered by rsync-sim.
#
# This fills the ≤60 s rsync lag window — the most recent readings that haven't
# yet appeared in a completed partitioned file from the host writer.
#
# Run with the same binary as the edge writer:
#   cd source/parquet_writer_cpp
#   ./parquet_writer --config ../../aws/gap_fill/config.yaml

mqtt:
  host: localhost
  port: 1884                    # FlashMQ aws-sim (receives bridged data from host)
  client_id: gap-fill-writer    # distinct from subscriber-api and edge writer
  topic: "#"
  qos: 1

  topic_kv_map:
    site:   site_id
    rack:   rack_id
    module: module_id
    cell:   cell_id

  partition_field: site_id

output:
  base_path: /srv/data/parquet-aws-sim
  project_id: 0
  partitions:
    - "project={project_id}"
    - "site={site_id}"
    - "{year}"
    - "{month}"
    - "{day}"
  compression: snappy
  flush_interval_seconds: 60
  max_messages_per_part: 50000

  # current_state mode — one row per unique sensor (latest reading).
  # Sits at the store root; DuckDB union_by_name picks it up with all history.
  current_state_path: /srv/data/parquet-aws-sim/current_state.parquet
  hot_file_path: ""
