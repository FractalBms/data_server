# FlashMQ configuration — battery data pipeline
# Docs: https://www.flashmq.org/documentation/

port 1883

# Logging
log_file /var/log/flashmq/flashmq.log
log_level info

# Anonymous access — use TLS + auth for production AWS deployments
allow_anonymous true

# Performance tuning for high-throughput sensor data
client_initial_buffer_size 65536
max_packet_size 1048576

# Thread count — set to number of CPU cores
# thread_count 4

# No persistence needed — Telegraf/InfluxDB2 handle durability
# (This is a key difference vs NATS JetStream which has built-in durability)
# persistence false

# Limits
max_qos_msg_pending_per_client 1000
max_incoming_topic_aliases_per_client 16

# Logging of individual publishes — disable in production (high volume)
# log_subscriptions true
