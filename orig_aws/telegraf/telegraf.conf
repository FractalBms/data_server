# Telegraf configuration — MQTT consumer → InfluxDB2
# Docs: https://docs.influxdata.com/telegraf/

[agent]
  interval            = "1s"
  round_interval      = true
  metric_batch_size   = 1000
  metric_buffer_limit = 100000
  flush_interval      = "10s"
  flush_jitter        = "2s"
  precision           = "1s"
  hostname            = "data-server"
  omit_hostname       = false

# ── Input: MQTT Consumer ─────────────────────────────────────────────────────

[[inputs.mqtt_consumer]]
  ## MQTT broker — use "flashmq:1883" in Docker, "localhost:1883" natively
  servers = ["tcp://flashmq:1883"]

  ## Topics to subscribe to
  topics = ["batteries/#"]

  ## QoS (0=at most once, 1=at least once)
  qos = 1

  ## Client ID — must be unique if running multiple Telegraf instances
  client_id = "telegraf-battery-consumer"

  ## Keep-alive
  connection_timeout = "30s"
  keepalive          = 60

  ## Parse payload as JSON
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "battery_cell"

    ## Timestamp from message field (unix seconds)
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "timestamp"
      rename = "timestamp"
      type   = "int"

    ## Tags — indexed, used for filtering/grouping
    [[inputs.mqtt_consumer.json_v2.tag]]
      path   = "site_id"
    [[inputs.mqtt_consumer.json_v2.tag]]
      path   = "rack_id"
    [[inputs.mqtt_consumer.json_v2.tag]]
      path   = "module_id"
    [[inputs.mqtt_consumer.json_v2.tag]]
      path   = "cell_id"

    ## Measurements — stored as fields
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "voltage"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "current"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "temperature"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "soc"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "soh"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "resistance"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "capacity"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "power"
      type = "float"

# ── Output: InfluxDB v2 ───────────────────────────────────────────────────────

[[outputs.influxdb_v2]]
  ## InfluxDB2 URL — use "http://influxdb:8086" in Docker, "http://localhost:8086" natively
  urls = ["http://influxdb:8086"]

  ## Auth token (set during influx setup or DOCKER_INFLUXDB_INIT_ADMIN_TOKEN)
  token = "battery-token-secret"

  ## Organisation and bucket
  organization = "battery-org"
  bucket       = "battery-data"

  ## Timeout
  timeout = "5s"

  ## Retry on failure
  # max_retry_time = "150s"
  # retry_interval = "10s"

# ── Optional: Internal metrics (Telegraf health) ─────────────────────────────

[[inputs.internal]]
  collect_memstats = false
