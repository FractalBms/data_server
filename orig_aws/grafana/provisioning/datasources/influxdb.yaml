apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    jsonData:
      version: Flux
      organization: battery-org
      defaultBucket: battery-data
      tlsSkipVerify: true
    secureJsonData:
      token: battery-token-secret
