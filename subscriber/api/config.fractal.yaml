# Subscriber API — fractal-phil Phase 1 edge simulation
# Live data: MQTT from host FlashMQ :1883
# History:   DuckDB reads /srv/data/parquet-aws-sim (rsync-sim from writer.cpp output)

mqtt:
  host: localhost
  port: 1884                         # FlashMQ aws-sim (receives bridged data from host)
  client_id: subscriber-api-fractal
  default_topic: "batteries/#"

# Local filesystem path — no S3 needed on fractal-phil
# DuckDB glob: {local_path}/project={project_id}/site={site_id}/{date}/*.parquet
local:
  path: "/srv/data/parquet-aws-sim"

s3:
  endpoint_url: ""
  bucket: ""
  region: "us-east-1"
  access_key: ""
  secret_key: ""
  prefix: ""
  gap_fill_prefix: ""
  project_id: 0

websocket:
  host: 0.0.0.0
  port: 8767

flux_http:
  port: 8768

history:
  default_limit: 1000
  max_limit: 10000
