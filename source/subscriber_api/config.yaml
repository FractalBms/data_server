# NATS — used only for the live subscription (plain core subscribe, no consumer)
nats:
  url: "nats://localhost:4222"
  stream_name: BATTERY_DATA          # still needed if you ever want JetStream history replay
  subject_filter: "batteries.>"

# S3 / MinIO — Parquet history store
s3:
  endpoint_url: "http://localhost:9000"   # MinIO (local dev); remove for real AWS S3
  bucket: battery-data
  region: us-east-1
  access_key: minioadmin
  secret_key: minioadmin
  prefix: ""                              # set if parquet_writer uses a key prefix

# WebSocket server
server:
  host: "0.0.0.0"
  port: 8767
