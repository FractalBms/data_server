# FlashMQ configuration — local x86 test broker
# Replaces AWS IoT Core for the Telegraf pipeline test

port 1883
listen_backlog 64

# Allow anonymous connections for local testing
allow_anonymous true

# Log to file
log_file /tmp/flashmq.log
log_level info

# Performance tuning
thread_count 4
max_packet_size 1048576

# No persistence needed for test broker
